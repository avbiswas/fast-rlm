max_calls_per_subagent: 20
max_depth: 3
truncate_len: 2000
# primary_agent is REQUIRED and has no default — you must set it (e.g.
# RLMConfig(primary_agent="..."). If sub_agent is omitted it copies primary_agent.
max_money_spent: 0.2
# API retry / timeout
api_max_retries: 3
api_timeout_ms: 30000
# Ablation toggles (default true). Set false to remove the capability from the
# agent's REPL and strip it from the system prompt (applies to root + sub-agents).
enable_tools: true
enable_structured_io: true
# Compression guard: force a self-confirm before delegating a large,
# barely-compressed context to a subagent (ablatable).
enable_compression_guard: true
compression_min_chars: 5000
compression_ratio: 0.6
